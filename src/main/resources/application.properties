spring.application.name=KLTN_GIAPHAONLINE
# Server Port
server.port=8080
# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.orm.results.bind=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=DEBUG
# logging.level.org.springframework.transaction=DEBUG
# ===============================
# CONNECTION POOL (HIKARI)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# ========================
# Swagger Configuration
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# ========================
# Redis
# ========================
spring.data.redis.repositories.enabled=false
# ==================
# MinIO
# =================
minio.url=http://localhost:9000
minio.access-key=admin
minio.secret-key=admin123
minio.bucket=family
minio.presign-expire=86400
minio.region=us-east-1
minio.public-url=http://localhost:9000
# folders
minio.avatar-prefix=avatars
minio.document-prefix=documents
minio.temp-prefix=temp
minio.max-file-size=5MB
# ================
# File limits protect the server.
# ================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.connection-timeout=300000
# API Prefix
api.prefix=api/v1
# ==================
# FLYWAY
# =================
#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.validate-migration-naming=true
# ========================
# Security JWT Configuration
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refreshable-duration=${JWT_REFRESHABLE_DURATION}
# ======================
# Rabbitmq
# ======================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=3000ms
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.template.retry.max-attempts=3
# ---  WebSocket STOMP ---
app.websocket.stomp.host=localhost
app.websocket.stomp.port=61613
app.websocket.stomp.username=guest
app.websocket.stomp.password=guest
# ====================
# MAIL
# ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD} 
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
# ===================
# Thymeleaf
# ===================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
# ===================
# Ratelimit
# ===================
app.rate-limit.capacity=50
app.rate-limit.refill-tokens=50
app.rate-limit.duration-minutes=1
app.timezone=Asia/Ho_Chi_Minh
# ===================
# APP FE
# ===================
app.frontend.base-url=http://localhost:5173
app.frontend.verify-endpoint=/register-by-invitation/
# ========================
#  VNPay Integration
# ========================
payment.vnPay.url=${PAY_URL}
payment.vnPay.tmnCode=${TMN_CODE}
payment.vnPay.secretKey=${SECRET_KEY}
payment.vnPay.returnUrl=${RETURN_URL}
payment.vnPay.version=${VERSION}
