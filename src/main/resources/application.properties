spring.application.name=KLTN_GIAPHAONLINE

# Server Port (N?u mu?n ??i c?ng, m?c ??nh l‡ 8080)
server.port=8080

# ===============================
# DATABASE - POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/giaphaonline?options=-c%20TimeZone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL (HIKARI)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# Swagger Configuration
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==================
# MinIO
# =================
minio.url=http://localhost:9000
minio.access-key=admin
minio.secret-key=admin123
minio.bucket=family
minio.presign-expire=300
# ================
# File limits protect the server.
# ================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# Th?i gian ch? (Timeout) nÍn t?ng lÍn ?? tr·nh ??t k?t n?i khi up video ch?m
server.tomcat.connection-timeout=300000
# API Prefix
api.prefix=api/v1

# ==================
# FLYWAY
# =================

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
