<div th:fragment="main-content" style="text-align: center; padding: 10px 0;">
    <h2 style="color: #2c3e50; font-size: 24px; margin-bottom: 10px;">
        Chào mừng, <span th:text="${fullName}" style="color: #4A6FA5;"></span> 🎉
    </h2>

    <p style="color: #555555; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
        Tài khoản của bạn đã được khởi tạo thành công trên hệ thống Gia Phả Online. <br>
        Hãy bắt đầu kết nối và lưu giữ những giá trị dòng họ ngay hôm nay!
    </p>

    <a th:href="${loginUrl}"
       style="background-color: #4A6FA5;
              color: #ffffff;
              padding: 15px 30px;
              text-decoration: none;
              border-radius: 5px;
              font-weight: bold;
              display: inline-block;
              box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        Đăng Nhập Ngay
    </a>
</div>
